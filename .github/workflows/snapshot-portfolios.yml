name: snapshot-portfolios

on:
  schedule:
    - cron: "10,40 * * * *"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: snapshot-portfolios
  cancel-in-progress: false

jobs:
  portfolios:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 1

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Pull + write snapshot
        env:
          # Optional repo variable; when unset the script no-ops cleanly.
          PORTFOLIO_WATCHLIST: ${{ vars.PORTFOLIO_WATCHLIST }}
        run: node scripts/snapshot-portfolios.mjs

      - name: Commit + push if changes
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .snapshots/portfolios/ || true
          if git diff --staged --quiet; then
            echo "no changes — skipping commit"
            exit 0
          fi
          git commit -m "[snapshot] portfolios $(date -u +%FT%H-%M-%SZ)"
          git pull --rebase
          git push origin HEAD:main
