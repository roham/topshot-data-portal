name: snapshot-month-aggregate

on:
  schedule:
    - cron: "45 5 * * *"   # 05:45 UTC every day (~just past midnight ET)
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: snapshot-month-aggregate
  cancel-in-progress: false

jobs:
  month:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 1

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Pull + write snapshot
        run: node scripts/snapshot-month-aggregate.mjs

      - name: Commit + push if changes
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .snapshots/month/
          if git diff --staged --quiet; then
            echo "no changes — skipping commit"
            exit 0
          fi
          git commit -m "[snapshot] month $(date -u +%FT%H-%M-%SZ)"
          git pull --rebase
          git push origin HEAD:main
