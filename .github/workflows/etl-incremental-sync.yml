name: etl-incremental-sync

on:
  schedule:
    - cron: "*/15 * * * *"  # every 15 minutes
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: etl-incremental-sync
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      GOOGLE_APPLICATION_CREDENTIALS: /tmp/bq-sa.json
      BQ_PROJECT_ID: dapperlabs-data
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install deps
        run: npm ci --no-audit --no-fund

      - name: Write BQ service-account JSON
        env:
          BQ_SA_JSON: ${{ secrets.GCP_BQ_SA_JSON }}
        run: |
          umask 077
          printf '%s' "$BQ_SA_JSON" > /tmp/bq-sa.json
          test -s /tmp/bq-sa.json || (echo "BQ SA JSON empty"; exit 1)

      - name: Run incremental sync
        id: sync
        run: node scripts/etl/bq-incremental-sync.mjs | tee /tmp/etl-run.log

      - name: Refresh materialized views
        if: success()
        run: node scripts/etl/bq-refresh-mvs.mjs

      - name: Upload run log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: etl-incremental-${{ github.run_id }}
          path: /tmp/etl-run.log
          retention-days: 14

      - name: Clean SA file
        if: always()
        run: rm -f /tmp/bq-sa.json
