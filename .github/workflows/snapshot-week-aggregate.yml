name: snapshot-week-aggregate

on:
  schedule:
    - cron: "30 */12 * * *"   # every 12 hours, offset 30 min from day cron
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: snapshot-week-aggregate
  cancel-in-progress: false

jobs:
  week:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 1

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Pull + write snapshot
        run: node scripts/snapshot-week-aggregate.mjs

      - name: Commit + push if changes
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .snapshots/week/
          if git diff --staged --quiet; then
            echo "no changes — skipping commit"
            exit 0
          fi
          git commit -m "[snapshot] week $(date -u +%FT%H-%M-%SZ)"
          git pull --rebase
          git push origin HEAD:main
